services:
  playwright-mcp:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    container_name: playwright-mcp
    ports:
      - "8931:8931"
    environment:
      - DISPLAY=:99
    networks:
      - infra_network
    restart: unless-stopped

networks:
  infra_network:
    external: true
    name: infra_network
